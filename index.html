<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lawrence Chen</title>
    <style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: 'Segoe UI', sans-serif;
        background-color: #f4f7f6;
    }

    /* Standard Desktop Navbar */
    nav {
        background-color: #2c3e50;
        padding: 1rem;
    }

    nav ul {
        display: flex;
        justify-content: center;
        list-style: none;
    }

    nav li {
        margin: 0 20px;
    }

    nav a {
        color: white;
        text-decoration: none;
        font-weight: bold;
    }

    /* --- THE MEDIA QUERY --- */
    /* If the screen is 600px wide or LESS... */
    @media (max-width: 600px) {
        nav ul {
            flex-direction: column; /* Stack links vertically */
            align-items: center;    /* Center them */
        }

        nav li {
            margin: 10px 0;         /* Add space between stacked links */
        }
    }

    .container {
        max-width: 800px;
        margin: 40px auto;
        padding: 0 20px;
        text-align: center;
    }
</style>
</head>
<body>

    <nav>
        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Services</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
    </nav>

    <div class="container">
        <h1>Welcome to the Homepage</h1>
        <p>The navigation bar above stays at the top of the screen. We used <strong>Flexbox</strong> (<code>display: flex</code>) to line up the links horizontally instead of having them stacked like a standard list.</p>
    </div>

</body>
</html>
