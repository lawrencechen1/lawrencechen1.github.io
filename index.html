<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lawrence Chen</title>
    <style>
        /* Reset default margins and padding */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            background-color: #f4f7f6;
        }

        /* Navigation Bar Styles */
        nav {
            background-color: #2c3e50;
            color: white;
            padding: 1rem;
            position: sticky; /* Keeps it at the top as you scroll */
            top: 0;
        }

        nav ul {
            display: flex; /* Aligns list items horizontally */
            justify-content: center; /* Centers the links */
            list-style: none;
        }

        nav li {
            margin: 0 20px;
        }

        nav a {
            color: white;
            text-decoration: none;
            font-weight: bold;
            transition: color 0.3s ease;
        }

        nav a:hover {
            color: #3498db;
        }

        /* Main content container */
        .container {
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
        }

        h1 {
            color: #2c3e50;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <nav>
        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Services</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
    </nav>

    <div class="container">
        <h1>Welcome to the Homepage</h1>
        <p>The navigation bar above stays at the top of the screen. We used <strong>Flexbox</strong> (<code>display: flex</code>) to line up the links horizontally instead of having them stacked like a standard list.</p>
    </div>

</body>
</html>
